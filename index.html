<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
    <title>ระบบบันทึกข้อมูล Access Control (Firebase)</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Sarabun', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f0f2f5;
            margin: 0;
            padding: 10px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 20px;
        }
        h1 {
            color: #1a2639;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 24px;
            border-bottom: 3px solid #3498db;
            padding-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        h1::before {
            content: "🔐";
            font-size: 28px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .form-group {
            margin-bottom: 10px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #2c3e50;
            font-size: 14px;
        }
        .form-group label span {
            color: #e74c3c;
            margin-left: 4px;
        }
        .form-group label .optional {
            color: #6b7280;
            font-weight: normal;
            font-size: 12px;
            margin-left: 5px;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            background-color: #f8fafc;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #3498db;
            background-color: white;
            box-shadow: 0 0 0 3px rgba(52,152,219,0.1);
        }
        .form-group input:disabled, .form-group select:disabled, .form-group textarea:disabled {
            background-color: #e9ecef;
            cursor: not-allowed;
            opacity: 0.7;
        }
        .time-group {
            display: flex;
            gap: 8px;
        }
        .time-group select {
            width: 35%;
        }
        .time-group input {
            width: 65%;
        }
        .floor-plan-section {
            grid-column: span 2;
            margin: 5px 0 15px 0;
            padding: 15px;
            background-color: #f8fafc;
            border-radius: 12px;
            border: 2px dashed #cbd5e0;
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .floor-plan-section:hover {
            border-color: #3498db;
            background-color: #f0f7ff;
        }
        .floor-plan-image {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .floor-plan-placeholder {
            color: #64748b;
            text-align: center;
            font-size: 14px;
        }
        .floor-plan-placeholder i {
            font-size: 40px;
            display: block;
            margin-bottom: 10px;
            color: #94a3b8;
        }
        .button-group {
            grid-column: span 2;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background-color: #3498db;
            color: white;
            box-shadow: 0 2px 5px rgba(52,152,219,0.3);
        }
        .btn-primary:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(52,152,219,0.4);
        }
        .btn-reset {
            background-color: #94a3b8;
            color: white;
        }
        .btn-reset:hover {
            background-color: #64748b;
        }
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-weight: 500;
            animation: slideDown 0.3s ease;
            font-size: 14px;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .alert-success { background-color: #d1fae5; border: 1px solid #a7f3d0; color: #065f46; }
        .alert-error { background-color: #fee2e2; border: 1px solid #fecaca; color: #991b1b; }
        .alert-warning { background-color: #ffedd5; border: 1px solid #fed7aa; color: #9a3412; }
        .alert-info { background-color: #dbeafe; border: 1px solid #bfdbfe; color: #1e40af; }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        .current-time {
            color: #4b5563;
            font-size: 14px;
            background-color: #f1f5f9;
            padding: 8px 12px;
            border-radius: 30px;
            white-space: nowrap;
        }
        .connection-status {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        .status-connected { background-color: #d1fae5; color: #065f46; }
        .status-disconnected { background-color: #fee2e2; color: #991b1b; }
        .required-note {
            font-size: 12px;
            color: #6b7280;
            margin-top: 5px;
            grid-column: span 2;
        }
        .required-note span { color: #e74c3c; }
        @media (max-width: 640px) {
            body { padding: 5px; }
            .container { padding: 15px; }
            .header-row { flex-direction: column; align-items: flex-start; gap: 5px; }
            h1 { font-size: 20px; margin-bottom: 5px; line-height: 1.3; }
            h1::before { font-size: 24px; }
            .current-time { font-size: 12px; padding: 6px 10px; margin-bottom: 5px; align-self: flex-start; }
            .connection-status { margin-bottom: 10px; font-size: 12px; width: 100%; text-align: left; }
            .form-grid { grid-template-columns: 1fr; gap: 12px; }
            .floor-plan-section { grid-column: span 1; min-height: 200px; height: auto; max-height: 300px; margin: 5px 0 10px 0; padding: 10px; }
            .floor-plan-image { max-height: 280px; }
            .form-group { margin-bottom: 5px; }
            .form-group label { font-size: 14px; }
            .form-group input, .form-group select, .form-group textarea { padding: 12px; font-size: 16px; }
            .time-group { gap: 8px; }
            .time-group select, .time-group input { padding: 12px; }
            .time-group select { width: 40%; }
            .time-group input { width: 60%; }
            .button-group { grid-column: span 1; flex-direction: column; gap: 8px; margin-top: 15px; padding-top: 15px; }
            .btn { width: 100%; padding: 14px; font-size: 16px; justify-content: center; }
            .required-note { grid-column: span 1; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-row">
            <h1>ระบบบันทึกข้อมูล Access Control</h1>
            <div class="current-time" id="currentDateTime"></div>
        </div>
        <div id="connectionStatus" class="connection-status status-disconnected">
            ⚡ กำลังตรวจสอบการเชื่อมต่อ...
        </div>
        <div id="alert" class="alert"></div>
        <form id="accessForm" class="form-grid">
            <div class="form-group">
                <label for="floor">ชั้น <span>*</span></label>
                <select id="floor" required>
                    <option value="">-- กรุณาเลือกชั้น --</option>
                </select>
            </div>
            <div class="form-group">
                <label for="department">หน่วยงาน <span>*</span></label>
                <select id="department" required disabled>
                    <option value="">-- กรุณาเลือกหน่วยงาน --</option>
                </select>
            </div>
            <div class="floor-plan-section" id="imageContainer">
                <div id="imagePlaceholder" class="floor-plan-placeholder">
                    <i>🏢</i> กรุณาเลือกชั้นและหน่วยงาน
                </div>
                <img id="displayImage" class="floor-plan-image" style="display: none;" alt="รูปภาพ">
            </div>
            <div class="form-group">
                <label for="doorNumber">เลขประตู <span>*</span></label>
                <select id="doorNumber" required disabled>
                    <option value="">-- กรุณาเลือกประตู --</option>
                </select>
            </div>
            <div class="form-group">
                <label for="timeOffset">เวลาคลาดเคลื่อน (นาที) <span>*</span></label>
                <div class="time-group">
                    <select id="timeDirection" required>
                        <option value="เร็วกว่า">เร็วกว่า</option>
                        <option value="ช้ากว่า">ช้ากว่า</option>
                    </select>
                    <input type="number" id="timeOffset" placeholder="จำนวนนาที" min="0" step="1" value="0" required>
                </div>
            </div>
            <div class="form-group">
                <label for="powerSupplyVoltage">แรงดัน Power Supply (V) <span>*</span></label>
                <input type="number" id="powerSupplyVoltage" placeholder="เช่น 12.00" step="0.01" min="0" max="30" required>
            </div>
            <div class="form-group">
                <label for="batteryVoltage">แรงดันแบตเตอรี่ (V) <span>*</span></label>
                <input type="number" id="batteryVoltage" placeholder="เช่น 12.45" step="0.01" min="0" max="30" required>
            </div>
            <div class="form-group">
                <label for="adminName">ชื่อ Admin <span>*</span></label>
                <input type="text" id="adminName" placeholder="ชื่อผู้ดูแลระบบ" required>
            </div>
            <div class="form-group" style="grid-column: span 2;">
                <label for="additionalProblem">ปัญหาเพิ่มเติม <span class="optional">(ไม่บังคับ)</span></label>
                <textarea id="additionalProblem" placeholder="ระบุปัญหาเพิ่มเติมที่พบ (ถ้ามี)"></textarea>
            </div>
            <div class="required-note"><span>*</span> ข้อมูลที่ต้องกรอก</div>
            <div class="button-group">
                <button type="button" class="btn btn-reset" onclick="resetForm()">
                    <span>↺</span> ล้างข้อมูล
                </button>
                <button type="submit" class="btn btn-primary">
                    <span>💾</span> บันทึกข้อมูล
                </button>
            </div>
        </form>
    </div>

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        // ====================== CONFIG ======================
        // ⚠️ แก้ไขเป็นของโปรเจกต์คุณจาก Firebase Console -> Project settings
        const firebaseConfig = {
  	apiKey: "AIzaSyB8TEo2xThu9VuDsdViMq3pHXcDPiYvL_U",
  	authDomain: "ma-access-control-records.firebaseapp.com",
  	projectId: "ma-access-control-records",
  	storageBucket: "ma-access-control-records.firebasestorage.app",
  	messagingSenderId: "63381747693",
  	appId: "1:63381747693:web:faff2e8cde14d79e2659e4",
  	measurementId: "G-22WFX8YX2W"
	};

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ====================== UI HELPERS ======================
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = 'alert alert-' + type;
            alert.style.display = 'block';
            setTimeout(() => { alert.style.display = 'none'; }, 5000);
        }

        function showLoading(show) {
            const submitBtn = document.querySelector('button[type="submit"]');
            submitBtn.innerHTML = show ? '<span>⏳</span> กำลังบันทึก...' : '<span>💾</span> บันทึกข้อมูล';
            submitBtn.disabled = show;
        }

        // ====================== FIREBASE OPERATIONS ======================
        // ดึงข้อมูลประตูทั้งหมดจาก Firestore
        async function fetchAllDoors() {
            const snapshot = await db.collection('doors').get();
            return snapshot.docs.map(doc => ({
                id: doc.id,
                ...doc.data()
            }));
        }

        // ดึงข้อมูลที่บันทึกแล้วทั้งหมด
        async function fetchAllRecords() {
            const snapshot = await db.collection('records').get();
            return snapshot.docs.map(doc => ({
                id: doc.id,
                ...doc.data()
            }));
        }

        // สร้าง key สำหรับเช็คซ้ำ
        function makeRecordKey(floor, department, doorNumber) {
            return `${floor}|${department}|${doorNumber}`;
        }

        // ====================== LOGIC (แบบ Client-side Join) ======================
        let allDoors = [];
        let recordedKeys = new Set();

        // โหลดข้อมูลใหม่ทุกครั้งที่ต้องการ (หรือเรียกครั้งเดียวแล้ว cache)
        async function loadCachedData() {
            const [doors, records] = await Promise.all([
                fetchAllDoors(),
                fetchAllRecords()
            ]);
            allDoors = doors;
            recordedKeys = new Set(records.map(r => makeRecordKey(r.floor, r.department, r.doorNumber)));
        }

        // ฟังก์ชันที่เหลือใช้ข้อมูลจากตัวแปรด้านบน
        function getAvailableFloors() {
            const floors = new Set();
            allDoors.forEach(door => {
                const key = makeRecordKey(door.floor, door.department, door.doorNumber);
                if (!recordedKeys.has(key)) {
                    floors.add(door.floor);
                }
            });
            return Array.from(floors).sort();
        }

        function getAvailableDepartments(floor) {
            const departments = new Set();
            allDoors
                .filter(door => door.floor === floor)
                .forEach(door => {
                    const key = makeRecordKey(door.floor, door.department, door.doorNumber);
                    if (!recordedKeys.has(key)) {
                        departments.add(door.department);
                    }
                });
            return Array.from(departments).sort();
        }

        function getAvailableDoorsWithDetails(floor, department) {
            const doorsData = allDoors.filter(door => door.floor === floor && door.department === department);
            const availableDoors = doorsData.filter(door => {
                const key = makeRecordKey(door.floor, door.department, door.doorNumber);
                return !recordedKeys.has(key);
            });

            // หา floorPlan (ใช้ของแถวแรกที่มี)
            const floorPlanUrl = doorsData.length > 0 ? doorsData[0].floorPlanUrl || '' : '';
            
            const doorImages = {};
            availableDoors.forEach(door => {
                if (door.doorImageUrl) {
                    doorImages[door.doorNumber] = door.doorImageUrl;
                }
            });

            return {
                doors: availableDoors.map(d => d.doorNumber),
                floorPlan: floorPlanUrl,
                doorImages: doorImages
            };
        }

        // ====================== UI UPDATE FUNCTIONS ======================
        let currentFloorPlan = '';
        let doorImages = {};

        function populateFloors(floors) {
            const floorSelect = document.getElementById('floor');
            floorSelect.innerHTML = '<option value="">-- กรุณาเลือกชั้น --</option>';
            floors.forEach(floor => {
                const option = document.createElement('option');
                option.value = floor;
                option.textContent = 'ชั้น ' + floor;
                floorSelect.appendChild(option);
            });
        }

        function populateDepartments(departments) {
            const deptSelect = document.getElementById('department');
            deptSelect.innerHTML = '<option value="">-- กรุณาเลือกหน่วยงาน --</option>';
            departments.forEach(dept => {
                const option = document.createElement('option');
                option.value = dept;
                option.textContent = dept;
                deptSelect.appendChild(option);
            });
        }

        function updateDoorSelect(doors) {
            const doorSelect = document.getElementById('doorNumber');
            doorSelect.innerHTML = '<option value="">-- กรุณาเลือกประตู --</option>';
            doors.forEach(door => {
                const option = document.createElement('option');
                option.value = door;
                option.textContent = door;
                doorSelect.appendChild(option);
            });
        }

        function showFloorPlan() {
            const image = document.getElementById('displayImage');
            const placeholder = document.getElementById('imagePlaceholder');
            if (currentFloorPlan && currentFloorPlan.startsWith('http')) {
                image.src = currentFloorPlan;
                image.onload = () => {
                    image.style.display = 'block';
                    placeholder.style.display = 'none';
                };
                image.onerror = () => {
                    image.style.display = 'none';
                    placeholder.style.display = 'block';
                    placeholder.innerHTML = '<i>❌</i> ไม่สามารถโหลดรูปผังหน่วยงาน';
                };
            } else {
                image.style.display = 'none';
                placeholder.style.display = 'block';
                placeholder.innerHTML = '<i>🏢</i> ไม่มีรูปผังสำหรับหน่วยงานนี้';
            }
        }

        function showDoorImage(doorNumber) {
            const image = document.getElementById('displayImage');
            const placeholder = document.getElementById('imagePlaceholder');
            const url = doorImages[doorNumber];
            if (url && url.startsWith('http')) {
                image.src = url;
                image.onload = () => {
                    image.style.display = 'block';
                    placeholder.style.display = 'none';
                };
                image.onerror = () => showFloorPlan();
            } else {
                showFloorPlan();
            }
        }

        function hideImage() {
            document.getElementById('displayImage').style.display = 'none';
            document.getElementById('imagePlaceholder').style.display = 'block';
            document.getElementById('imagePlaceholder').innerHTML = '<i>🏢</i> กรุณาเลือกชั้นและหน่วยงาน';
        }

        // ====================== EVENT HANDLERS ======================
        async function loadFloors() {
            try {
                showLoading(true);
                await loadCachedData();
                const floors = getAvailableFloors();
                populateFloors(floors);
                if (floors.length === 0) showAlert('ไม่พบชั้นที่ยังมีข้อมูลให้บันทึก', 'info');
            } catch (err) {
                showAlert('ไม่สามารถโหลดข้อมูล: ' + err.message, 'error');
            } finally {
                showLoading(false);
            }
        }

        document.getElementById('floor').addEventListener('change', async function() {
            const floor = this.value;
            const deptSelect = document.getElementById('department');
            deptSelect.innerHTML = '<option value="">-- กรุณาเลือกหน่วยงาน --</option>';
            deptSelect.disabled = !floor;
            document.getElementById('doorNumber').innerHTML = '<option value="">-- กรุณาเลือกประตู --</option>';
            document.getElementById('doorNumber').disabled = true;
            hideImage();

            if (floor) {
                try {
                    showLoading(true);
                    // ใช้ข้อมูลที่ cache ไว้แล้ว
                    const departments = getAvailableDepartments(floor);
                    populateDepartments(departments);
                    if (departments.length === 0) showAlert('ไม่พบหน่วยงานที่ยังมีข้อมูลให้บันทึกในชั้นนี้', 'info');
                } catch (err) {
                    showAlert('ผิดพลาด: ' + err.message, 'error');
                } finally {
                    showLoading(false);
                }
            }
        });

        document.getElementById('department').addEventListener('change', async function() {
            const floor = document.getElementById('floor').value;
            const department = this.value;
            document.getElementById('doorNumber').innerHTML = '<option value="">-- กรุณาเลือกประตู --</option>';
            document.getElementById('doorNumber').disabled = !department;

            if (floor && department) {
                try {
                    showLoading(true);
                    const { doors, floorPlan, doorImages: images } = getAvailableDoorsWithDetails(floor, department);
                    currentFloorPlan = floorPlan;
                    doorImages = images;
                    updateDoorSelect(doors);
                    if (doors.length === 0) {
                        showAlert('ไม่พบประตูที่ยังไม่ได้บันทึกสำหรับหน่วยงานนี้', 'info');
                    }
                    showFloorPlan();
                } catch (err) {
                    showAlert('ผิดพลาด: ' + err.message, 'error');
                } finally {
                    showLoading(false);
                }
            }
        });

        document.getElementById('doorNumber').addEventListener('change', function() {
            const doorNumber = this.value;
            if (doorNumber) {
                showDoorImage(doorNumber);
            } else {
                showFloorPlan();
            }
        });

        // ====================== SAVE DATA ======================
        document.getElementById('accessForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            if (isLoading) return;

            const floor = document.getElementById('floor').value;
            const department = document.getElementById('department').value;
            const doorNumber = document.getElementById('doorNumber').value;
            const timeOffset = parseFloat(document.getElementById('timeOffset').value);
            const timeDirection = document.getElementById('timeDirection').value;
            const powerSupplyVoltage = parseFloat(document.getElementById('powerSupplyVoltage').value);
            const batteryVoltage = parseFloat(document.getElementById('batteryVoltage').value);
            const adminName = document.getElementById('adminName').value.trim();
            const additionalProblem = document.getElementById('additionalProblem').value.trim();

            // Validation
            if (!floor || !department || !doorNumber) {
                showAlert('กรุณาเลือกชั้น หน่วยงาน และประตูให้ครบถ้วน', 'error');
                return;
            }
            if (isNaN(timeOffset) || timeOffset < 0) {
                showAlert('กรุณากรอกเวลาคลาดเคลื่อนให้ถูกต้อง', 'error');
                return;
            }
            if (isNaN(powerSupplyVoltage) || powerSupplyVoltage < 0 || powerSupplyVoltage > 30) {
                showAlert('กรุณากรอกแรงดัน Power Supply ให้ถูกต้อง (0-30 V)', 'error');
                return;
            }
            if (isNaN(batteryVoltage) || batteryVoltage < 0 || batteryVoltage > 30) {
                showAlert('กรุณากรอกแรงดันแบตเตอรี่ให้ถูกต้อง (0-30 V)', 'error');
                return;
            }
            if (!adminName) {
                showAlert('กรุณากรอกชื่อ Admin', 'error');
                return;
            }

            if (!confirm('ยืนยันการบันทึกข้อมูล?')) return;

            isLoading = true;
            showLoading(true);

            // สร้าง Document ID (จะซ้ำไม่ได้)
            const recordId = `${floor}_${department}_${doorNumber}`
                .replace(/[\/\s\.#\$\[\]]/g, '_')
                .replace(/_+/g, '_');

            try {
                await db.collection('records').doc(recordId).create({
                    floor: floor,
                    department: department,
                    doorNumber: doorNumber,
                    timeDirection: timeDirection,
                    timeOffset: timeOffset,
                    powerSupplyVoltage: powerSupplyVoltage,
                    batteryVoltage: batteryVoltage,
                    adminName: adminName,
                    additionalProblem: additionalProblem || '',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                showAlert('บันทึกข้อมูลสำเร็จ', 'success');
                resetForm();
                await loadFloors(); // รีเฟรชข้อมูล
            } catch (error) {
                if (error.code === 'already-exists') {
                    alert('ประตูนี้มีการบันทึกแล้ว');
                    showAlert('ประตูนี้มีการบันทึกข้อมูลไปแล้ว', 'error');
                } else {
                    showAlert('เกิดข้อผิดพลาด: ' + error.message, 'error');
                }
            } finally {
                isLoading = false;
                showLoading(false);
            }
        });

        let isLoading = false;

        // ====================== INIT & RESET ======================
        function resetForm() {
            document.getElementById('accessForm').reset();
            document.getElementById('department').disabled = true;
            document.getElementById('doorNumber').disabled = true;
            hideImage();
            document.getElementById('timeOffset').value = '0';
            document.getElementById('timeDirection').value = 'เร็วกว่า';
            document.getElementById('powerSupplyVoltage').value = '';
            document.getElementById('batteryVoltage').value = '';
            document.getElementById('additionalProblem').value = '';
            doorImages = {};
            currentFloorPlan = '';
        }

        function updateCurrentTime() {
            const now = new Date();
            const options = { 
                year: 'numeric', month: 'long', day: 'numeric',
                hour: '2-digit', minute: '2-digit', second: '2-digit',
                hour12: false, timeZone: 'Asia/Bangkok'
            };
            document.getElementById('currentDateTime').innerHTML = '🕐 ' + now.toLocaleDateString('th-TH', options);
        }

        // ทดสอบเชื่อมต่อ Firestore
        async function testConnection() {
            const statusEl = document.getElementById('connectionStatus');
            try {
                const testDoc = await db.collection('doors').limit(1).get();
                statusEl.className = 'connection-status status-connected';
                statusEl.innerHTML = `✅ เชื่อมต่อ Firestore สำเร็จ (${testDoc.size} เอกสารทดสอบ)`;
            } catch (err) {
                statusEl.className = 'connection-status status-disconnected';
                statusEl.innerHTML = '❌ การเชื่อมต่อล้มเหลว: ' + err.message;
            }
        }

        // เริ่มต้นเมื่อโหลดหน้า
        window.onload = async function() {
            updateCurrentTime();
            setInterval(updateCurrentTime, 1000);
            await testConnection();
            await loadFloors();
        };

        window.addEventListener('beforeunload', function() {
            if (isLoading) return 'กำลังบันทึกข้อมูล กรุณารอสักครู่...';
        });
    </script>
</body>
</html>
